<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Subject Grade Calculator</h2>
        <p>Enter your marks out of 100 for the 4 subjects:</p>
        
        <form id="gradeForm">
            <div class="input-group">
                <label for="sub1">Subject 1:</label>
                <input type="number" id="sub1" min="0" max="100" required>
            </div>
            <div class="input-group">
                <label for="sub2">Subject 2:</label>
                <input type="number" id="sub2" min="0" max="100" required>
            </div>
            <div class="input-group">
                <label for="sub3">Subject 3:</label>
                <input type="number" id="sub3" min="0" max="100" required>
            </div>
            <div class="input-group">
                <label for="sub4">Subject 4:</label>
                <input type="number" id="sub4" min="0" max="100" required>
            </div>
            <button type="button" onclick="calculateGrades()">Calculate</button>
        </form>

        <div id="result" class="result-box hidden">
            <h3>Results</h3>
            <p><strong>Total Marks:</strong> <span id="resTotal">0</span> / 400</p>
            <p><strong>Average Marks:</strong> <span id="resAverage">0</span>%</p>
            <p><strong>Final Grade:</strong> <span id="resGrade" class="grade-badge">-</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
